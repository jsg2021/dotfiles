console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 4
final_space = true

[upgrade]
  auto = true
  notice = true
  interval = "24h"
  source = "cdn"

[secondary_prompt]
  template = '❯❯ '
  foreground = 'lightGreen'
  background = 'transparent'

[transient_prompt]
  template = ' ❯ '
  foreground = ''
  background = 'transparent'
  foreground_templates = ['{{if gt .Code 0}}red{{end}}', '{{if eq .Code 0}}lightGreen{{end}}']

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    style = 'plain'
    template = '{{ .Path }}'
    foreground = 'cyan'
    background = 'transparent'
    type = 'path'

    [blocks.segments.properties]
      style = 'unique'

  [[blocks.segments]]
    type = "jujutsu"
    style = "plain"
    foreground = "#ffeb3b"
    background = "transparent"

    # [options]
    # fetch_status = true
    # ignore_working_copy = false
    # fetch_ahead_counter = true
    # ahead_icon = "⇡"

  [[blocks.segments]]
    style = 'plain'
    template = ' <#fff>on</>{{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }}<cyan>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>'
    foreground = '#ff94df'
    background = 'transparent'
    type = 'git'

    [blocks.segments.properties]
      disable_with_jj = true
      branch_icon = ' <#ff94df><b> </b></>'
      commit_icon = '@ '
      fetch_stash_count = true
      fetch_status = true
      fetch_upstream_icon = true

      [blocks.segments.properties.mapped_branches]
        'bug/*' = '🐛 '
        'feat/*' = '🚀 '
        'fix/*' = '🐛 '

[[blocks]]
  type = 'rprompt'
  overflow = 'hidden'

  # Today's Claude Code usage (cost · tokens). A precmd hook (in configs/shell/prompt)
  # exports $CCUSAGE_TODAY from ccusage — cached & refreshed in the background — and this
  # text segment just displays it. (oh-my-posh removed the `command` segment, and the
  # native `claude` segment only has data as Claude Code's statusline.)
  [[blocks.segments]]
    type = 'text'
    style = 'plain'
    foreground = "#FFFFFF"
    background = "#FF6B35"
    template = '{{ if .Env.CCUSAGE_TODAY }} 󰯉 {{ .Env.CCUSAGE_TODAY }} {{ end }}'

  # (removed old, non-rendering claude-segment leftover:󰯉 {{ .Model.DisplayName }}  {{ .TokenGauge }} "

  [[blocks.segments]]
    style = 'plain'
    foreground = '#111111'
    background = '#FFD664'
    type = 'upgrade'

  [[blocks.segments]]
    style = 'plain'
    template = '{{ .FormattedMs }}'
    foreground = 'yellow'
    background = 'transparent'
    type = 'executiontime'

  [blocks.segments.properties]
    threshold = 5000

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    style = 'plain'
    template = ' ❯'
    foreground = ''
    background = 'transparent'
    type = 'text'
    foreground_templates = ['{{if gt .Code 0}}red{{end}}', '{{if eq .Code 0}}lightGreen{{end}}']
